<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCache Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>OpenCache</h1>
      <span id="event-count">0 events</span>
    </div>
    <div class="header-right">
      <button id="btn-new-session" class="btn btn-primary" onclick="openNewSessionModal()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        New Session
      </button>
      <span id="connection-status" class="status-dot disconnected"></span>
      <span id="connection-label">Disconnected</span>
    </div>
  </header>

  <div id="layout">
    <!-- Sidebar: session list -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Sessions</span>
        <span id="session-count">0</span>
      </div>
      <div id="session-list">
        <div class="sidebar-empty">No sessions yet</div>
      </div>
    </aside>

    <!-- Main: event feed -->
    <main id="main">
      <div id="session-header" style="display:none">
        <div class="session-header-info">
          <span class="session-header-agent" id="session-header-agent"></span>
          <span class="session-header-id" id="session-header-id"></span>
          <span class="session-header-cwd" id="session-header-cwd"></span>
        </div>
        <button class="btn-ghost" onclick="showAllSessions()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 3L3 9M3 3l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Clear filter
        </button>
      </div>
      <div id="event-feed"></div>
      <!-- Status bar + composer (only when a session is selected) -->
      <div id="session-bottom" style="display:none">
        <div id="session-status-bar"></div>
        <div id="session-composer"></div>
      </div>
    </main>
  </div>

  <!-- New Session modal -->
  <div id="new-session-overlay" class="overlay" style="display:none" onclick="closeNewSessionModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span>New Session</span>
        <button class="overlay-close" onclick="closeNewSessionModal()">&times;</button>
      </div>
      <div class="modal-body">
        <label class="form-label">Agent</label>
        <div class="agent-picker" id="agent-picker">
          <!-- populated at runtime from /api/agents -->
        </div>

        <label class="form-label">Working directory</label>
        <input type="text" id="new-cwd" class="form-input" placeholder="/root" value="">

        <label class="form-label">Prompt</label>
        <textarea id="new-prompt" class="form-textarea" rows="6" placeholder="What do you want the agent to do?"></textarea>

        <div id="new-session-error" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeNewSessionModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-spawn" onclick="submitNewSession()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Send
        </button>
      </div>
    </div>
  </div>

  <!-- Raw JSON overlay -->
  <div id="overlay" style="display:none" onclick="hideOverlay()">
    <div id="overlay-box" onclick="event.stopPropagation()">
      <div id="overlay-header">
        <span>Raw JSON</span>
        <button onclick="hideOverlay()" class="overlay-close">&times;</button>
      </div>
      <pre id="overlay-content"></pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
